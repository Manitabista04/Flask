{% extends 'base.html' %}
{% block title %} Home {% endblock title %}
{% block body %}
   
    <div class="container">
      <h2>Update your Todo</h2>
      <form action="/update/{{todo.sno}}" method="POST">
      <div class="mb-3">
  <label for="title" class="form-label">ToDo Title</label>
  <input type="text" class="form-control" name="title" id="title" value="{{todo.title}}">
</div>
<div class="mb-3">
  <label for="desc" class="form-label">ToDo Description</label>
  <input type="text" class="form-control" name="desc" id="desc" value="{{todo.desc}}">
</div>
  <button type="submit" class="btn btn-dark mb-2">Update</button>
  </form>
    </div>
    <h5 style="margin-left: 300px;"> Your Todo items</h5>
    
  
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

 {% endblock body %}
